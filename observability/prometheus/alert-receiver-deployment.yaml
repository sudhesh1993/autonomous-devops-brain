apiVersion: v1
kind: ServiceAccount
metadata:
  name: adb-alert-receiver
  namespace: monitoring
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::595252767542:role/adb-alert-receiver-dev

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adb-alert-receiver
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adb-alert-receiver
  template:
    metadata:
      labels:
        app: adb-alert-receiver
    spec:
      serviceAccountName: adb-alert-receiver
      containers:
        - name: alert-receiver
          image: 595252767542.dkr.ecr.ap-south-2.amazonaws.com/adb-alert-receiver:latest
          ports:
            - containerPort: 8080
          env:
            - name: AWS_REGION
              value: "ap-south-2"
            - name: EVENT_BUS_NAME
              value: "default"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: adb-alert-receiver
  namespace: monitoring
spec:
  selector:
    app: adb-alert-receiver
  ports:
    - port: 8080
      targetPort: 8080